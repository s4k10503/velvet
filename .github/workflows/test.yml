name: Test

# Only changes that can affect what Unity compiles or imports trigger the
# Unity jobs: the embedded package, project settings/assets, and this
# workflow. Generators~ sources are excluded — the Unity side consumes their
# committed DLLs under Runtime/Plugins, so a generator change reaches this
# workflow when the redeployed DLLs are committed. Docs and markdown never
# affect the tests.
on:
  push:
    branches: [main]
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/test.yml'
      - '!Packages/com.velvet.core/Generators~/**'
      - '!Packages/com.velvet.core/Documentation~/**'
      - '!**.md'
  pull_request:
    branches: [main]
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/test.yml'
      - '!Packages/com.velvet.core/Generators~/**'
      - '!Packages/com.velvet.core/Documentation~/**'
      - '!**.md'
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read the source; checks:write lets game-ci publish the test-result check run
# (without it the Unity jobs fail with "Resource not accessible by integration").
permissions:
  contents: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether a Unity license secret is configured. Secrets cannot be
  # referenced directly in a job-level `if`, so expose it as an output here.
  # ---------------------------------------------------------------------------
  license-check:
    name: Check Unity license secret
    runs-on: ubuntu-latest
    outputs:
      has_license: ${{ steps.check.outputs.has_license }}
    steps:
      - id: check
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -n "$UNITY_LICENSE" ]; then
            echo "has_license=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_license=false" >> "$GITHUB_OUTPUT"
            echo "::notice::UNITY_LICENSE secret is not set — skipping Unity EditMode/PlayMode tests. See README/CONTRIBUTING for Personal license activation."
          fi

  # ---------------------------------------------------------------------------
  # Unity EditMode / PlayMode tests via game-ci. Requires a Unity license.
  # A free Personal license works: activate manually (request .alf, upload to
  # id.unity.com, download the .ulf) and store its contents as the UNITY_LICENSE
  # secret, plus UNITY_EMAIL / UNITY_PASSWORD.
  #
  # NOTE: the game-ci editor Docker image for the pinned Unity version must
  # exist (see https://game.ci/docs and unityci/editor tags). Very new editor
  # versions may not have an image yet.
  # ---------------------------------------------------------------------------
  unity-tests:
    name: Unity tests (${{ matrix.testMode }})
    needs: license-check
    if: needs.license-check.outputs.has_license == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode: [EditMode, PlayMode]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-

      - name: Run ${{ matrix.testMode }} tests
        uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9 # v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.11f1
          testMode: ${{ matrix.testMode }}
          projectPath: .
          artifactsPath: ${{ matrix.testMode }}-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: Test results (${{ matrix.testMode }})
          path: ${{ matrix.testMode }}-results
