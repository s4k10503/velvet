name: UPM

# Maintains the `upm` branch — a package-at-root mirror of Packages/com.velvet.core,
# generated by `git subtree split`. Consumers install from this branch:
#   "com.velvet.core": "https://github.com/s4k10503/velvet.git#upm"
# Releases (workflow_dispatch) additionally place a vX.Y.Z tag on the split commit:
#   "com.velvet.core": "https://github.com/s4k10503/velvet.git#v1.0.0"
#
# No Unity license is required — this is pure git.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0). Must match package.json. Creates tag vX.Y.Z on the upm branch."
        required: true

permissions:
  contents: write

concurrency:
  group: upm
  cancel-in-progress: false

jobs:
  split:
    name: Split package to upm branch
    runs-on: ubuntu-latest
    env:
      PREFIX: Packages/com.velvet.core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # subtree split needs full history

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify version matches package.json (release only)
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PKG_VERSION=$(sed -nE 's/.*"version": *"([^"]+)".*/\1/p' "$PREFIX/package.json" | head -1)
          echo "package.json version: $PKG_VERSION / requested: $VERSION"
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match requested release version ($VERSION). Bump package.json first."
            exit 1
          fi

      - name: Subtree split (tests stripped) → upm branch
        id: split
        run: |
          SPLIT=$(git subtree split --prefix="$PREFIX")
          git checkout --quiet "$SPLIT"
          # Strip developer-only sources from the published artifact. Test asmdefs are gated by
          # UNITY_INCLUDE_TESTS (off for installed packages); the source generators ship as prebuilt
          # DLLs under Runtime/Plugins, so their Roslyn source in Generators~ (a Unity-ignored '~'
          # folder) is needed only to rebuild them; and the Preview example stories are this repo's own
          # verification fixtures — shipping them would inject "Examples/*" entries into every consumer's
          # Preview window, so they stay in the dev project but not the package. Matches every Tests/
          # folder (+ sibling Tests.meta), the test-only TestUtilities assembly, Generators~, and
          # Editor/Preview/Examples (+ sibling Examples.meta).
          REMOVE=$(git ls-files | grep -E '(^|/)Tests(/|\.meta$)|(^|/)TestUtilities(/|\.meta$)|(^|/)Generators~(/|\.meta$)|(^|/)Preview/Examples(/|\.meta$)' || true)
          if [ -n "$REMOVE" ]; then
            printf '%s\n' "$REMOVE" | tr '\n' '\0' | xargs -0 git rm --quiet
            git commit --quiet --amend --no-edit
          fi
          FINAL=$(git rev-parse HEAD)
          echo "sha=$FINAL" >> "$GITHUB_OUTPUT"
          git push --force origin "$FINAL:refs/heads/upm"
          echo "Pushed package-at-root split (tests stripped) $FINAL to refs/heads/upm"

      - name: Tag and publish release (release only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          SPLIT_SHA: ${{ steps.split.outputs.sha }}
        run: |
          TAG="v${VERSION}"
          git tag "$TAG" "$SPLIT_SHA"
          git push origin "$TAG"
          # The split artifact is amended per release (test stripping), so vX.Y.Z tags are
          # one-off snapshots with no ancestor relation between releases — they cannot anchor
          # a "changes since the last release" compare link. Tag the main-side release point
          # too (vX.Y.Z-main on the commit that triggered this dispatch) and link the release
          # notes to the compare between consecutive -main tags instead.
          MAIN_TAG="v${VERSION}-main"
          git tag "$MAIN_TAG" "$GITHUB_SHA"
          git push origin "$MAIN_TAG"
          PREV_MAIN_TAG=$(git tag -l "v*-main" --sort=-v:refname | grep -vx "$MAIN_TAG" | head -1)
          if [ -n "$PREV_MAIN_TAG" ]; then
            gh release create "$TAG" --title "$TAG" \
              --notes "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_MAIN_TAG}...${MAIN_TAG}"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
