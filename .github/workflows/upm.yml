name: UPM

# Maintains the `upm` branch — a package-at-root mirror of Packages/com.velvet.core,
# generated by `git subtree split`. Consumers install from this branch:
#   "com.velvet.core": "https://github.com/s4k10503/velvet.git#upm"
# Releases (workflow_dispatch) additionally place a vX.Y.Z tag on the split commit:
#   "com.velvet.core": "https://github.com/s4k10503/velvet.git#v1.0.0"
#
# No Unity license is required — this is pure git.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0). Must match package.json. Creates tag vX.Y.Z on the upm branch."
        required: true

permissions:
  contents: write

concurrency:
  group: upm
  cancel-in-progress: false

jobs:
  split:
    name: Split package to upm branch
    runs-on: ubuntu-latest
    env:
      PREFIX: Packages/com.velvet.core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # subtree split needs full history

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify version matches package.json (release only)
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PKG_VERSION=$(sed -nE 's/.*"version": *"([^"]+)".*/\1/p' "$PREFIX/package.json" | head -1)
          echo "package.json version: $PKG_VERSION / requested: $VERSION"
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match requested release version ($VERSION). Bump package.json first."
            exit 1
          fi

      - name: Subtree split (tests stripped) → upm branch
        id: split
        run: |
          SPLIT=$(git subtree split --prefix="$PREFIX")
          git checkout --quiet "$SPLIT"
          # Strip developer-only sources from the published artifact. None of these are used by a
          # consumer's build: test asmdefs are gated by UNITY_INCLUDE_TESTS (off for installed
          # packages), and the source generators ship as prebuilt DLLs under Runtime/Plugins — their
          # Roslyn source in Generators~ (a Unity-ignored '~' folder) is needed only to rebuild them.
          # So this removes pure disk noise, not anything a consumer compiles. Matches every Tests/
          # folder (+ sibling Tests.meta), the test-only TestUtilities assembly, and Generators~.
          REMOVE=$(git ls-files | grep -E '(^|/)Tests(/|\.meta$)|(^|/)TestUtilities(/|\.meta$)|(^|/)Generators~(/|\.meta$)' || true)
          if [ -n "$REMOVE" ]; then
            printf '%s\n' "$REMOVE" | tr '\n' '\0' | xargs -0 git rm --quiet
            git commit --quiet --amend --no-edit
          fi
          FINAL=$(git rev-parse HEAD)
          echo "sha=$FINAL" >> "$GITHUB_OUTPUT"
          git push --force origin "$FINAL:refs/heads/upm"
          echo "Pushed package-at-root split (tests stripped) $FINAL to refs/heads/upm"

      - name: Tag and publish release (release only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          SPLIT_SHA: ${{ steps.split.outputs.sha }}
        run: |
          TAG="v${VERSION}"
          git tag "$TAG" "$SPLIT_SHA"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes
